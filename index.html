<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>神奇括號變身 - 家長出題版</title>
    <style>
        :root { --primary: #4CAF50; --bg: #f4f7f6; --text: #333; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; box-sizing: border-box; overscroll-behavior-y: none; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #2E7D32; }
        .section { margin-bottom: 20px; padding: 20px; border-radius: 10px; background: #e8f5e9; }
        .student-section { background: #fff3e0; display: none; }
        .history-section { background: #e3f2fd; display: none; }
        
        input[type="password"], textarea { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { background: var(--primary); color: white; padding: 15px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .qr-btn { background: #9C27B0; }
        .history-btn { background: #2196F3; }
        
        #qrZone { text-align: center; margin-top: 15px; display: none; padding: 15px; border: 2px dashed #ce93d8; background: #f3e5f5; }
        #qrImage { max-width: 220px; margin-top: 10px; border: 5px solid #fff; }

        .question-card { background: #fff; padding: 15px; margin: 15px 0; border-radius: 10px; border: 2px solid #ffe0b2; }
        .canvas-container { border: 2px solid #bbb; background: #fff; margin: 10px 0; border-radius: 8px; }
        canvas { width: 100%; height: 180px; display: block; touch-action: none; }
        
        .tools { display: flex; gap: 8px; margin-bottom: 10px; }
        .tool-btn { flex: 1; padding: 8px; font-size: 14px; background: #eee; border-radius: 5px; border: 1px solid #ccc; }
        .tool-btn.active { background: #ffb74d; color: #fff; }
        
        .feedback { padding: 12px; margin-top: 10px; border-radius: 8px; display: none; font-weight: bold; text-align: center; }
        .correct { background: #e8f5e9; color: #2e7d32; border: 1px solid #4CAF50; }
        .wrong { background: #ffebee; color: #c62828; border: 1px solid #f44336; }
        
        #loading, #gradingStatus { text-align: center; font-size: 18px; color: #ff9800; display: none; font-weight: bold; }
        .history-item { background: #fff; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 5px solid #2196F3; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="parentZone" class="section">
        <h2>🛠️ 家長出題區</h2>
        <input type="password" id="apiKey" placeholder="請輸入 Gemini API Key">
        <textarea id="promptText" placeholder="輸入指令，例如：出 5 題 A-B+C 轉 A+(-B)+C 的題目"></textarea>
        
        <button onclick="generateQuiz()">1. 點此先在手機出題 ✨</button>
        <p id="loading">AI 正在思考題目...</p>

        <div id="previewZone" style="display:none; margin-top:20px; background:#fff; padding:15px; border-radius:8px;">
            <h3 style="margin-top:0;">📋 預覽題目內容：</h3>
            <div id="previewList" style="font-size:16px; color:#555;"></div>
            <button class="qr-btn" onclick="generateQRCode()">2. 確認沒問題，產生 iPad 條碼 📱</button>
        </div>

        <div id="qrZone">
            <p>請用 iPad 相機掃描下方條碼：</p>
            <img id="qrImage" src="">
        </div>
        
        <button class="history-btn" onclick="showHistory()" style="margin-top:20px;">📁 查看 iPad 上的測驗紀錄</button>
    </div>

    <div id="studentZone" class="section student-section">
        <h1>⭐ Alyssa 的手寫任務 ⭐</h1>
        <div id="quizContainer"></div>
        <button id="gradeBtn" onclick="gradeWithAI()" style="background:#E91E63; font-size:22px;">🤖 寫完了！請 AI 老師批改</button>
        <p id="gradingStatus">AI 正在批改中...</p>
        <button onclick="location.href=location.pathname" style="background:#757575; margin-top:10px;">🔙 返回主選單</button>
    </div>

    <div id="historyZone" class="section history-section">
        <h2>📁 歷史紀錄</h2>
        <div id="historyContainer"></div>
        <button onclick="location.href=location.pathname" style="background:#757575;">🔙 返回</button>
    </div>
</div>

<script>
    let currentQuizData = [];
    let canvases = [];

    window.onload = function() {
        const savedKey = localStorage.getItem('geminiApiKey');
        if (savedKey) document.getElementById('apiKey').value = savedKey;

        // 檢查網址是否有傳遞考卷資料
        const urlParams = new URLSearchParams(window.location.search);
        const dataParam = urlParams.get('d');
        if (dataParam) {
            try {
                // 解碼 Base64 並解析 JSON
                currentQuizData = JSON.parse(decodeURIComponent(escape(window.atob(dataParam))));
                renderQuiz();
            } catch (e) {
                alert("考卷讀取失敗！");
            }
        }
    };

    // 手機端功能：先出題並預覽
    async function generateQuiz() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const prompt = document.getElementById('promptText').value.trim();
        if (!apiKey || !prompt) { alert("請輸入 Key 和指令"); return; }
        
        localStorage.setItem('geminiApiKey', apiKey);
        document.getElementById('loading').style.display = 'block';

        const sys = `請產生數學題 JSON 陣列。主題：將 A - B + C 改寫成 A + (-B) + C。格式：[{"question": "14 - 6 + 5 =", "answer": "14 + (-6) + 5"}]。勿含 markdown 標記。`;

        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: sys + "\n指令：" + prompt }] }] })
            });
            const data = await resp.json();
            const text = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
            currentQuizData = JSON.parse(text);

            // 顯示預覽
            document.getElementById('previewList').innerHTML = currentQuizData.map((q, i) => `<div>${i+1}. ${q.question}</div>`).join('');
            document.getElementById('previewZone').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        } catch (e) { alert("出題失敗：" + e.message); }
        finally { document.getElementById('loading').style.display = 'none'; }
    }

    // 手機端功能：將「已出好的題目」封裝進 QR Code
    function generateQRCode() {
        const jsonStr = JSON.stringify(currentQuizData);
        // 使用 Base64 編碼避免網址特殊字元問題
        const encodedData = window.btoa(unescape(encodeURIComponent(jsonStr)));
        const shareUrl = window.location.origin + window.location.pathname + "?d=" + encodedData;
        
        const qrApi = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(shareUrl)}`;
        document.getElementById('qrImage').src = qrApi;
        document.getElementById('qrZone').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    // iPad 端功能：渲染考卷
    function renderQuiz() {
        document.getElementById('parentZone').style.display = 'none';
        document.getElementById('studentZone').style.display = 'block';
        const container = document.getElementById('quizContainer');
        container.innerHTML = '';
        canvases = [];

        currentQuizData.forEach((q, i) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `
                <div class="question-text">第 ${i+1} 題： ${q.question}</div>
                <div class="tools">
                    <button class="tool-btn active" id="pen_${i}" onclick="setTool(${i}, 'pen')">✏️ 筆</button>
                    <button class="tool-btn" id="eraser_${i}" onclick="setTool(${i}, 'eraser')">🧽 擦</button>
                    <button class="tool-btn" onclick="clearCanvas(${i})">🗑️ 清</button>
                </div>
                <div class="canvas-container"><canvas id="canvas_${i}"></canvas></div>
                <div class="feedback" id="f_${i}"></div>
            `;
            container.appendChild(card);
            initCanvas(i);
        });
    }

    // 畫布與批改邏輯 (保持與之前版本一致)
    function initCanvas(index) {
        const canvas = document.getElementById(`canvas_${index}`);
        const ctx = canvas.getContext('2d');
        const ratio = window.devicePixelRatio || 1;
        canvas.width = canvas.offsetWidth * ratio; canvas.height = 180 * ratio;
        ctx.scale(ratio, ratio);
        ctx.fillStyle = "#fff"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.lineCap = 'round'; ctx.lineWidth = 4;
        let drawing = false; let lx, ly;
        canvases[index] = { canvas, ctx, tool: 'pen' };

        const getXY = (e) => {
            const r = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - r.left, y: cy - r.top };
        };
        const start = (e) => { e.preventDefault(); drawing = true; const p = getXY(e); lx = p.x; ly = p.y; };
        const move = (e) => { if(!drawing) return; e.preventDefault(); const p = getXY(e); ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(p.x, p.y); ctx.stroke(); lx = p.x; ly = p.y; };
        canvas.addEventListener('touchstart', start); canvas.addEventListener('touchmove', move); canvas.addEventListener('touchend', () => drawing=false);
        canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); canvas.addEventListener('mouseup', () => drawing=false);
    }

    function setTool(i, t) {
        const c = canvases[i]; c.tool = t;
        document.getElementById(`pen_${i}`).classList.toggle('active', t==='pen');
        document.getElementById(`eraser_${i}`).classList.toggle('active', t==='eraser');
        c.ctx.globalCompositeOperation = t==='pen' ? 'source-over' : 'destination-out';
        c.ctx.lineWidth = t==='pen' ? 4 : 25;
    }

    function clearCanvas(i) {
        const c = canvases[i];
        c.ctx.globalCompositeOperation = 'source-over';
        c.ctx.fillStyle = "#fff"; c.ctx.fillRect(0,0,c.canvas.width,c.canvas.height);
    }

    async function gradeWithAI() {
        const key = document.getElementById('apiKey').value;
        const status = document.getElementById('gradingStatus');
        status.style.display = 'block';
        let score = 0;

        for (let i = 0; i < currentQuizData.length; i++) {
            status.innerText = `正在批改第 ${i+1} 題...`;
            const img = canvases[i].canvas.toDataURL("image/jpeg", 0.8).split(',')[1];
            const ans = currentQuizData[i].answer;
            const prompt = `你是數學老師。手寫圖答案是否符合：「${ans}」？請回傳JSON: {"correct": true, "msg": "辨識到的字"}`;

            try {
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: img } }] }] })
                });
                const d = await resp.json();
                const res = JSON.parse(d.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));
                const f = document.getElementById(`f_${i}`);
                f.style.display = 'block';
                if(res.correct) { f.className='feedback correct'; f.innerText='⭕ 答對了！'; score++; }
                else { f.className='feedback wrong'; f.innerHTML=`❌ 不對喔！AI辨識為: ${res.msg}<br>正確答案: ${ans}`; }
            } catch(e) { console.error(e); }
        }
        status.innerText = `批改完成！總分：${score} / ${currentQuizData.length}`;
        saveRecord(score, currentQuizData.length);
    }

    function saveRecord(s, t) {
        const history = JSON.parse(localStorage.getItem('quizHistory') || '[]');
        history.unshift({ date: new Date().toLocaleString(), score: `${s}/${t}` });
        localStorage.setItem('quizHistory', JSON.stringify(history));
    }

    function showHistory() {
        document.getElementById('parentZone').style.display='none';
        document.getElementById('historyZone').style.display='block';
        const h = JSON.parse(localStorage.getItem('quizHistory') || '[]');
        document.getElementById('historyContainer').innerHTML = h.map(r => `<div class="history-item"><span>${r.date}</span><b>${r.score}</b></div>`).join('') || '尚無紀錄';
    }
</script>
</body>
</html>
